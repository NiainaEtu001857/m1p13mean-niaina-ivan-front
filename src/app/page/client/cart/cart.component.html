<div class="card mb-4">
    <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="card-title mb-0">Votre Panier</h5>
            <button class="btn btn-sm btn-outline-primary" (click)="toggleCart()">
              <span class="me-1">
                <i *ngIf="!showCart" class="fe fe-shopping-cart"></i> 
                <i *ngIf="showCart" class="fe fe-x-circle"></i>
              </span>
                <span class="badge bg-secondary ms-1">{{ cartTotal }}</span>
            </button>
        </div>
    </div>
</div>

<!-- Modal panier -->
<div class="cart-modal" *ngIf="showCart">
  <div class="cart-content shadow rounded">

    <div class="cart-header d-flex justify-content-between align-items-center">
      <h5>Votre Panier</h5>
      <button class="btn-close" (click)="toggleCart()">
        <span class="fe fe-x"></span>
      </button>
    </div>

    <div class="cart-body" *ngIf="cartItems.length > 0; else emptyCart">

  <div *ngFor="let cart of cartItems" class="cart-item d-flex justify-content-between align-items-start mb-3">
    <div class="cart-items-list flex-grow-1 me-3">
      <div *ngFor="let item of cart.items; let i = index" class="d-flex align-items-start mb-1">
        <div class="flex-grow-1">
          <strong>{{ item.serviceName }}</strong><br>
          <small>{{ item.quantity }} x {{ item.unitPrice }} € = {{ item.totalPrice }} €</small>
        </div>
        <button class="btn btn-sm btn-danger ms-2" (click)="remove(cart.shop , item)">
          <i class="fe fe-trash"></i>
        </button>
      </div>
    </div>
  </div>

</div>

    <ng-template #emptyCart>
      <div class="text-center text-muted py-4">
        Votre panier est vide
      </div>
    </ng-template>

    <hr *ngIf="cartItems.length > 0">

    <div class="cart-footer d-flex justify-content-between align-items-center" *ngIf="cartItems.length > 0">
      <strong>Total :</strong>
      <strong>{{ total }} €</strong>
    </div>

    <div class="card" >
      <div class="row ">
        <div class="col">
          <button class="btn btn-secondary w-100" (click)="toggleCart()">Clean</button>
        </div>
        <div class="col">
          <button class="btn btn-primary w-100" (click)="Buy()">Achat</button>
        </div>

    </div> 
    </div>
</div>
